<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvitArte — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #8FAF8F;
    --sage-light: #C8D8C8;
    --sage-pale: #EEF3EE;
    --cream: #FAF8F4;
    --warm: #F2EDE6;
    --text: #2C2C28;
    --text-muted: #7A7A72;
    --border: rgba(44,44,40,0.12);
    --border-strong: rgba(44,44,40,0.22);
    --white: #FFFFFF;
    --s-nuevo: #6BA3BE;
    --s-proceso: #D4C84B;
    --s-revision: #9B8EC4;
    --s-entregado: #6BAA7A;
    --s-pausado: #CC44BB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); font-size: 14px; line-height: 1.6; }

  .topbar { background: var(--white); border-bottom: 0.5px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; letter-spacing: 0.03em; color: var(--text); }
  .logo span { color: var(--sage); }
  .refresh-btn { display: flex; align-items: center; gap: 6px; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400; padding: 7px 16px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-muted); cursor: pointer; transition: all .2s; }
  .refresh-btn:hover { background: var(--warm); color: var(--text); }
  .refresh-btn svg { width: 14px; height: 14px; }

  .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 2rem; }
  .stat { background: var(--white); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
  .stat-label { font-size: 11px; font-weight: 400; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; color: var(--text); line-height: 1; }

  .controls { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .controls input, .controls select { font-family: 'Jost', sans-serif; font-size: 13px; padding: 8px 14px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: var(--white); color: var(--text); outline: none; transition: border-color .2s; }
  .controls input { flex: 1; min-width: 200px; }
  .controls input:focus, .controls select:focus { border-color: var(--sage); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }

  .card { background: var(--white); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.25rem; cursor: pointer; transition: border-color .2s, transform .15s; }
  .card:hover { border-color: var(--sage-light); transform: translateY(-1px); }
  .card-click { cursor: pointer; }
  .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; letter-spacing: 0.05em; }
  .av-boda { background: #E8F0F8; color: #3A6080; }
  .av-15 { background: #F5E8EF; color: #7A3456; }
  .av-otro { background: var(--warm); color: var(--text-muted); }
  .card-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.2; }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-left: auto; }

  .card-row { display: flex; align-items: flex-start; gap: 8px; font-size: 12.5px; color: var(--text-muted); margin-bottom: 5px; line-height: 1.4; }
  .card-row svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 2px; }
  .card-row span { color: var(--text); }

  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); gap: 8px; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 400; }
  .b-premium { background: #EEEDFE; color: #3C3489; }
  .b-clasica { background: var(--sage-pale); color: #3A5C3A; }
  .b-desde { background: #FDF0E0; color: #7A4A10; }
  .b-otro { background: var(--warm); color: var(--text-muted); }

  .cargo-select { font-family: 'Jost', sans-serif; font-size: 11px; padding: 3px 7px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: var(--cream); color: var(--text); cursor: pointer; outline: none; }
  .status-select { font-family: 'Jost', sans-serif; font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: var(--cream); color: var(--text); cursor: pointer; outline: none; }

  .overlay { position: fixed; inset: 0; background: rgba(44,44,40,0.4); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
  .modal { background: var(--white); border-radius: 16px; border: 0.5px solid var(--border); width: 100%; max-width: 580px; padding: 1.5rem; margin: auto; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: var(--text); }
  .close-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; display: flex; align-items: center; }
  .close-btn:hover { color: var(--text); }
  .close-btn svg { width: 20px; height: 20px; }

  .status-bar { display: flex; align-items: center; gap: 10px; padding: .875rem 1rem; background: var(--warm); border-radius: 10px; margin-bottom: 1.25rem; }
  .status-bar label { font-size: 12px; color: var(--text-muted); }
  .status-bar select { font-family: 'Jost', sans-serif; font-size: 13px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: var(--white); color: var(--text); outline: none; cursor: pointer; }

  .sec-label { font-size: 10px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .sec { margin-bottom: 1.25rem; }
  .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-key { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .field-val { font-size: 13px; color: var(--text); line-height: 1.45; word-break: break-word; }
  .field-full { grid-column: 1/-1; }
  .longtext { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-line; }
  .frase { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--text); line-height: 1.6; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }

  .note-area { width: 100%; font-family: 'Jost', sans-serif; font-size: 13px; padding: 10px 12px; border-radius: 10px; border: 0.5px solid var(--border-strong); background: var(--cream); color: var(--text); resize: vertical; min-height: 80px; outline: none; transition: border-color .2s; }
  .note-area:focus { border-color: var(--sage); }
  .save-btn { font-family: 'Jost', sans-serif; font-size: 13px; padding: 7px 18px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text); cursor: pointer; transition: all .2s; }
  .save-btn:hover { background: var(--sage-pale); border-color: var(--sage); }

  .wsp-link { color: var(--sage); text-decoration: none; font-size: 13px; }
  .wsp-link:hover { text-decoration: underline; }

  .empty { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 14px; }
  .loading { text-align: center; padding: 3rem; color: var(--text-muted); }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  .card-nuevo { border-color: #E8923A !important; background: #FEF5ED !important; }
  .card-proceso { border-color: #D4C84B !important; background: #FDFBE8 !important; }
  .card-revision { border-color: #9B8EC4 !important; background: #F5F2FD !important; }
  .card-entregado { border-color: #6BAA7A !important; background: #F0F9F2 !important; }
  .card-pausado { border-color: #CC44BB !important; background: #FDF0FB !important; }
  .card-pendiente { border-color: #C0392B !important; background: #FEF0EF !important; }

  @media (max-width: 640px) {
    .main { padding: 1rem; }
    .stats { grid-template-columns: repeat(3, 1fr); }
    .topbar { padding: 0 1rem; }
    .fgrid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Invit<span>Arte</span></div>
  <button class="refresh-btn" onclick="loadData()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    Actualizar
  </button>
</div>

<div class="main">
  <div class="stats" id="stats-area">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Bodas</div><div class="stat-val" id="s-bodas">—</div></div>
    <div class="stat"><div class="stat-label">15 años</div><div class="stat-val" id="s-xv">—</div></div>
    <div class="stat"><div class="stat-label">Preliminar</div><div class="stat-val" id="s-proceso">—</div></div>
    <div class="stat"><div class="stat-label">Entregados</div><div class="stat-val" id="s-entregados">—</div></div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Buscar por nombre, modelo, evento..." oninput="render()">
    <select id="f-tipo" onchange="render()">
      <option value="">Todos los eventos</option>
      <option value="Boda">Bodas</option>
      <option value="15">15 años</option>
    </select>
    <select id="f-plan" onchange="render()">
      <option value="">Todos los planes</option>
      <option value="Premium">Premium</option>
      <option value="Clásica">Clásica</option>
      <option value="Desde Cero">Desde Cero</option>
    </select>
    <select id="f-cargo" onchange="render()">
      <option value="">Mati y Ale</option>
      <option value="Mati">Solo Mati</option>
      <option value="Ale">Solo Ale</option>
    </select>
    <select id="f-estado" onchange="render()">
      <option value="">Todos los estados</option>
      <option value="nuevo">Por arrancar</option>
      <option value="proceso">Preliminar</option>
      <option value="revision">En revisión</option>
      <option value="entregado">Entregada</option>
      <option value="pausado">Pausado</option>
    </select>
  </div>

  <div class="legend">
    <span style="font-size:11px;color:var(--text-muted);margin-right:4px">Estado:</span>
    <div class="legend-item"><div class="legend-dot" style="background:var(--s-nuevo)"></div>Por arrancar</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--s-proceso)"></div>Preliminar</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--s-revision)"></div>En revisión</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--s-entregado)"></div>Entregada</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--s-pausado)"></div>Quedan para más adelante</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--s-pendiente)"></div>Esperando pago</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--s-pendiente)"></div>Esperando pago</div>
  </div>

  <div id="grid-area"><div class="loading">Cargando pedidos...</div></div>
</div>

<div id="modal-area"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzaFI31JOVmmqG8yVVR9FyNWJX42usHCo0BWHz7YBx131KOX-Wr2d8i8WCsuZHQdqmS/exec';
let allRows = [];
let states = {};
let cargo = {};
let notes = {};

function loadLocal() {
  try { states = JSON.parse(localStorage.getItem('ia_states') || '{}'); } catch(e) { states = {}; }
  try { cargo = JSON.parse(localStorage.getItem('ia_cargo') || '{}'); } catch(e) { cargo = {}; }
  try { notes = JSON.parse(localStorage.getItem('ia_notes') || '{}'); } catch(e) { notes = {}; }
}
function saveStates() { try { localStorage.setItem('ia_states', JSON.stringify(states)); } catch(e) {} }
function saveNotes() { try { localStorage.setItem('ia_notes', JSON.stringify(notes)); } catch(e) {} }

function shortKey(h) {
  const s = (h || '').toLowerCase().replace(/[^a-záéíóúñ0-9]/gi, ' ').trim();
  if (s.includes('nombre y apellido')) return 'nombre';
  if (s.includes('whatsapp') && !s.includes('confirmar')) return 'wsp';
  if (s.includes('tipo de evento')) return 'tipo';
  if (s.includes('protagonistas')) return 'protagonistas';
  if (s.includes('fecha del evento')) return 'fecha';
  if (s.includes('horario del evento')) return 'horario';
  if (s.includes('ubicaci')) return 'ubicacion';
  if (s.includes('m sica') || s.includes('musica') || s.includes('canci')) return 'musica';
  if (s.includes('cuenta regresiva')) return 'cuenta_reg';
  if (s.includes('datos para regalos')) return 'regalos';
  if (s.includes('dress code')) return 'dresscode';
  if (s.includes('confirmar asistencia')) return 'asistencia';
  if (s.includes('opci n se adapta') || s.includes('opcion se adapta') || s.includes('qu opci')) return 'plan';
  if (s.includes('lbum') || s.includes('album')) return 'album';
  if (s.includes('galer')) return 'galeria';
  if (s.includes('google calendar')) return 'calendar';
  if (s.includes('instagram') || s.includes('hashtag')) return 'hashtag';
  if (s.includes('sugerencia de canciones')) return 'sug_canciones';
  if (s.includes('secci n especial') || s.includes('seccion especial') || s.includes('agregar')) return 'secciones_extra';
  if (s.includes('modelo del cat')) return 'modelo';
  if (s.includes('frase especial')) return 'frase';
  if (s.includes('algo m s') || s.includes('algo mas') || s.includes('dise')) return 'notas_dis';
  if (s.includes('elegir cual')) return 'papeleria';
  if (s.includes('complemento')) return 'complementos';
  if (s.includes('comprobante')) return 'comprobante';
  if (s.includes('marca temporal')) return 'fecha_envio';
  if (s.includes('detalle extra')) return 'detalle_extra';
  if (s.includes('conociste')) return 'como_conocio';
  return null;
}

async function loadData() {
  document.getElementById('grid-area').innerHTML = '<div class="loading">Cargando pedidos...</div>';
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('Error ' + res.status);
    const json = await res.json();
    const headers = json.headers;
    const rows = json.rows;
    const keys = headers.map(shortKey);
    allRows = Object.values(rows).map((row, i) => {
      const obj = {};
      keys.forEach((k, j) => { if (k) obj[k] = (row[j] || '').toString().trim(); });
      // Override with direct column index (string keys from Apps Script)
      obj.protagonistas = (row['4']||'').toString().trim();
      obj.fecha = (row['5']||'').toString().trim();
      obj.horario = (row['6']||'').toString().trim();
      obj.ubicacion = (row['7']||'').toString().trim();
      obj.musica = (row['8']||'').toString().trim();
      obj.plan = (row['13']||'').toString().trim();
      obj.modelo = (row['21']||'').toString().trim();
      obj._id = i + '_' + (obj.nombre || 'x').replace(/\s/g, '').substring(0, 8);
      return obj;
    }).filter(r => r.nombre);
    updateStats();
    render();
  } catch(e) {
    document.getElementById('grid-area').innerHTML = `<div class="empty">No se pudo cargar la planilla.<br><small>${e.message}</small></div>`;
  }
}

function getCargo(id) { return cargo[id] || ''; }
function setCargo(id, val) {
  cargo[id] = val;
  saveCargo();
  fetch(API+'?action=setState&id='+encodeURIComponent(id)+'&state='+encodeURIComponent(getState(id))+'&cargo='+encodeURIComponent(val)).catch(()=>{});
}
function getState(id) { return states[id] || 'nuevo'; }
function stateColor(s) {
  const m = { nuevo: 'var(--s-nuevo)', proceso: 'var(--s-proceso)', revision: 'var(--s-revision)', entregado: 'var(--s-entregado)', pausado: 'var(--s-pausado)' };
  return m[s] || m.nuevo;
}

function updateStats() {
  document.getElementById('s-total').textContent = allRows.length;
  document.getElementById('s-bodas').textContent = allRows.filter(r => (r.tipo || '').toLowerCase().includes('boda')).length;
  document.getElementById('s-xv').textContent = allRows.filter(r => (r.tipo || '').includes('15')).length;
  document.getElementById('s-proceso').textContent = allRows.filter(r => getState(r._id) === 'proceso').length;
  document.getElementById('s-entregados').textContent = allRows.filter(r => getState(r._id) === 'entregado').length;
}

function initials(n) {
  if (!n) return '?';
  const p = n.trim().split(' ');
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}
function avClass(t) {
  if (!t) return 'av-otro';
  if (t.toLowerCase().includes('boda')) return 'av-boda';
  if (t.includes('15')) return 'av-15';
  return 'av-otro';
}
function bClass(p) {
  if (!p) return 'b-otro';
  const l = p.toLowerCase();
  if (l.includes('premium')) return 'b-premium';
  if (l.includes('cl') || l.includes('lasica')) return 'b-clasica';
  if (l.includes('cero')) return 'b-desde';
  return 'b-otro';
}
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const ft = document.getElementById('f-tipo').value;
  const fp = document.getElementById('f-plan').value;
  const fc = document.getElementById('f-cargo') ? document.getElementById('f-cargo').value : '';
  const fe = document.getElementById('f-estado').value;
  let rows = allRows.filter(r => {
    if (ft && !(r.tipo || '').includes(ft)) return false;
    if (fc && getCargo(r._id) !== fc) return false;
    if (fp && !(r.plan || '').toLowerCase().includes(fp.toLowerCase())) return false;
    if (fe && getState(r._id) !== fe) return false;
    if (q) { const h = [r.nombre, r.modelo, r.tipo, r.protagonistas, r.plan, r.fecha].join(' ').toLowerCase(); if (!h.includes(q)) return false; }
    return true;
  });
  const sorted = [...rows].sort((a, b) => new Date(b.fecha_envio || 0) - new Date(a.fecha_envio || 0));
  if (!sorted.length) { document.getElementById('grid-area').innerHTML = '<div class="empty">Sin resultados.</div>'; return; }
  document.getElementById('grid-area').innerHTML = `<div class="grid">${sorted.map(r => cardHTML(r)).join('')}</div>`;
}

function iconSVG(name) {
  const icons = {
    heart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>',
    x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    save: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>',
  };
  return icons[name] || '';
}

function cardHTML(r) {
  const st = getState(r._id);
  const plan = r.plan || '—';
  return `<div class="card card-${st}" id="card-${r._id}">
    <div class="card-click" onclick="openModal('${r._id}')">
      <div class="card-head">
        <div class="avatar ${avClass(r.tipo)}">${initials(r.nombre)}</div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${r.nombre}</div>
          <div class="card-sub">${r.tipo || '—'}</div>
        </div>
        <div class="status-dot" id="dot-${r._id}" style="background:${stateColor(st)}"></div>
      </div>
      <div class="card-row">${iconSVG('heart')}<span>${r.protagonistas || r.nombre || '—'}</span></div>
      <div class="card-row">${iconSVG('calendar')}<span>${r.fecha || '—'}</span></div>
      ${r.modelo ? `<div class="card-row">${iconSVG('file')}<span>${r.modelo}</span></div>` : ''}
    </div>
    <div class="card-footer">
      <span class="badge ${bClass(plan)}">${plan}</span>
      <select class="status-select" onchange="setStatus('${r._id}',this.value)" onclick="event.stopPropagation()">
        <option value="nuevo"${st==='nuevo'?' selected':''}>Por arrancar</option>
        <option value="proceso"${st==='proceso'?' selected':''}>Preliminar</option>
        <option value="revision"${st==='revision'?' selected':''}>En revisión</option>
        <option value="entregado"${st==='entregado'?' selected':''}>Entregada</option>
        <option value="pausado"${st==='pausado'?' selected':''}>Pausado</option>
      </select>
    </div>
  </div>`;
}

function setStatus(id, val) {
  states[id] = val;
  saveStates();
  updateStats();
  const dot = document.getElementById('dot-' + id);
  if (dot) dot.style.background = stateColor(val);
  // Save to Google Sheets
  fetch(`${API}?action=setState&id=${encodeURIComponent(id)}&state=${encodeURIComponent(val)}`)
    .catch(e => console.log('State saved locally only'));
}

function openModal(id) {
  const r = allRows.find(x => x._id === id);
  if (!r) return;
  const st = getState(id);
  const nt = notes[id] || '';
  const fields = [
    ['Protagonistas', r.protagonistas], ['Fecha del evento', r.fecha],
    ['Horario', r.horario], ['Plan', r.plan], ['Modelo', r.modelo],
    ['Dress code', r.dresscode], ['Cuenta regresiva', r.cuenta_reg],
    ['Asistencia', r.asistencia], ['Álbum fotos', r.album],
    ['Galería', r.galeria], ['Google Calendar', r.calendar],
    ['Hashtag', r.hashtag], ['Papelería', r.papeleria], ['Complementos', r.complementos],
  ].filter(([k, v]) => v);

  document.getElementById('modal-area').innerHTML = `
  <div class="overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="avatar ${avClass(r.tipo)}" style="width:44px;height:44px;font-size:14px">${initials(r.nombre)}</div>
          <div>
            <div class="modal-title">${r.nombre}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${r.tipo || ''} ${r.wsp ? `· <a href="https://wa.me/${r.wsp.replace(/\D/g,'')}" target="_blank" class="wsp-link">${r.wsp}</a>` : ''}</div>
          </div>
        </div>
        <button class="close-btn" onclick="document.getElementById('modal-area').innerHTML=''">${iconSVG('x')}</button>
      </div>

      <div class="status-bar">
        <label>A cargo:</label>
        <select style="font-family:'Jost',sans-serif;font-size:12px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border-strong);background:var(--white);color:var(--text)" onchange="setCargo('${id}',this.value)">
          <option value=""${getCargo(id)===''?' selected':''}>—</option>
          <option value="Mati"${getCargo(id)==='Mati'?' selected':''}>Mati</option>
          <option value="Ale"${getCargo(id)==='Ale'?' selected':''}>Ale</option>
        </select>
        <div class="status-dot" id="modal-dot-${id}" style="background:${stateColor(st)}"></div>
        <label>Estado:</label>
        <select onchange="setStatusModal('${id}',this)">
          <option value="nuevo"${st==='nuevo'?' selected':''}>Por arrancar</option>
          <option value="proceso"${st==='proceso'?' selected':''}>Preliminar</option>
          <option value="revision"${st==='revision'?' selected':''}>En revisión</option>
          <option value="entregado"${st==='entregado'?' selected':''}>Entregada</option>
          <option value="pausado"${st==='pausado'?' selected':''}>Pausado</option>
        </select>
      </div>

      ${fields.length ? `<div class="sec"><div class="sec-label">Datos del pedido</div><div class="fgrid">${fields.map(([k,v]) => `<div><div class="field-key">${k}</div><div class="field-val">${v}</div></div>`).join('')}</div></div>` : ''}
      ${r.ubicacion ? `<div class="sec"><div class="sec-label">Ubicación</div><div class="longtext">${r.ubicacion}</div></div>` : ''}
      ${r.musica ? `<div class="sec"><div class="sec-label">Música</div><div class="longtext" style="word-break:break-all">${r.musica}</div></div>` : ''}
      ${r.regalos ? `<div class="sec"><div class="sec-label">Datos para regalos</div><div class="longtext">${r.regalos}</div></div>` : ''}
      ${r.frase ? `<div class="sec"><div class="sec-label">Frase especial</div><div class="frase">"${r.frase}"</div></div>` : ''}
      ${r.secciones_extra ? `<div class="sec"><div class="sec-label">Secciones extra</div><div class="longtext">${r.secciones_extra}</div></div>` : ''}
      ${r.notas_dis ? `<div class="sec"><div class="sec-label">Notas de diseño</div><div class="longtext">${r.notas_dis}</div></div>` : ''}
      ${r.detalle_extra ? `<div class="sec"><div class="sec-label">Detalle extra</div><div class="longtext">${r.detalle_extra}</div></div>` : ''}
      ${r.como_conocio ? `<div class="sec"><div class="sec-label">Cómo nos conoció</div><div class="field-val">${r.como_conocio}</div></div>` : ''}

      <hr class="divider">
      <div class="sec-label" style="margin-bottom:8px">Notas internas</div>
      <textarea class="note-area" id="note-${id}" placeholder="Notas internas — solo visibles en este dashboard...">${nt}</textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:10px">
        <button class="save-btn" id="save-btn-${id}" onclick="saveNote('${id}')">${iconSVG('save')} Guardar nota</button>
      </div>
      <div style="margin-top:1rem;font-size:11px;color:var(--text-muted)">Enviado: ${fmtDate(r.fecha_envio)}</div>
    </div>
  </div>`;
}

function setStatusModal(id, sel) {
  setStatus(id, sel.value);
  const dot = document.getElementById('modal-dot-' + id);
  if (dot) dot.style.background = stateColor(sel.value);
}

function saveNote(id) {
  const ta = document.getElementById('note-' + id);
  if (!ta) return;
  notes[id] = ta.value;
  saveNotes();
  const btn = document.getElementById('save-btn-' + id);
  if (btn) { btn.textContent = '✓ Guardado'; setTimeout(() => { btn.innerHTML = iconSVG('save') + ' Guardar nota'; }, 1500); }
  // Save to Google Sheets
  fetch(`${API}?action=setState&id=${encodeURIComponent(id)}&state=${encodeURIComponent(getState(id))}&note=${encodeURIComponent(ta.value)}&saveNote=true`)
    .catch(e => console.log('Note saved locally only'));
}

function closeModal(e) {
  if (e && e.target.classList.contains('overlay')) document.getElementById('modal-area').innerHTML = '';
}

loadLocal();
loadData();
</script>
</body>
</html>
